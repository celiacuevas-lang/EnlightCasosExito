<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casos de Éxito | Enlight</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Alexandria', sans-serif; background-color: #f7f8f9; }
        .expandable-content { transition: max-height 0.5s ease-in-out, opacity 0.3s ease-in-out; max-height: 0; overflow: hidden; opacity: 0; }
        .expandable-content.open { max-height: 1500px; opacity: 1; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
        const { useState, useMemo } = React;

        const ProjectCard = ({ project }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [currentImg, setCurrentImg] = useState(0);
            const isBESS = project.solutionType.toLowerCase().includes('storage') || project.solutionType.includes('BESS');
            const isMicrogrid = project.solutionType.toLowerCase().includes('micro');
            const hasSlider = project.images && project.images.length > 1;

            return (
                <div className="bg-white rounded-3xl shadow-lg overflow-hidden flex flex-col border border-gray-100 h-fit">
                    <div className="relative group">
                        <img src={hasSlider ? project.images[currentImg] : project.image} className="w-full h-56 object-cover" />
                        {hasSlider && (
                            <div className="absolute inset-0 flex items-center justify-between px-2">
                                <button onClick={() => setCurrentImg(prev => (prev === 0 ? project.images.length - 1 : prev - 1))} className="bg-black/40 text-white p-2 rounded-full">‹</button>
                                <button onClick={() => setCurrentImg(prev => (prev === project.images.length - 1 ? 0 : prev + 1))} className="bg-black/40 text-white p-2 rounded-full">›</button>
                            </div>
                        )}
                    </div>
                    <div className="p-8">
                        <h3 className="font-bold text-xl text-[#293C47] mb-4">{project.clientName}</h3>
                        <div className="space-y-2 text-sm text-[#293C47]">
                            <div className="flex justify-between border-b pb-1"><span>Ubicación</span><span className="font-medium">{project.location}</span></div>
                            <div className="flex justify-between border-b pb-1">
                                <span>{isBESS ? 'Almacenamiento' : isMicrogrid ? 'Sector' : 'Potencia'}</span>
                                <span className="font-bold">{isBESS ? project.storageCapacity : isMicrogrid ? project.sector : project.power}</span>
                            </div>
                        </div>
                        <button onClick={() => setIsOpen(!isOpen)} className="mt-6 w-full py-4 bg-[#f7f8f9] text-[#293C47] rounded-2xl text-xs font-bold hover:bg-[#FFA817] hover:text-white transition-all uppercase">
                            {isOpen ? 'Ocultar Detalles' : 'Ver Detalles del Caso'}
                        </button>
                        <div className={"expandable-content " + (isOpen ? 'open' : '')}>
                            <div className="pt-8 mt-6 border-t space-y-6">
                                {project.clientLogo && <div className="flex justify-center"><img src={project.clientLogo} className="h-12 object-contain" /></div>}
                                <div className="grid grid-cols-2 gap-3 text-center text-[10px] uppercase">
                                    <div className="bg-gray-50 p-3 rounded-2xl"><div>Generación Anual</div><div className="font-bold text-sm">{project.annualGeneration}</div></div>
                                    <div className="bg-gray-50 p-3 rounded-2xl"><div>CO₂ Mitigado</div><div className="font-bold text-sm">{project.co2Mitigated}</div></div>
                                </div>
                                <div className="text-xs space-y-3 bg-gray-50 p-4 rounded-2xl text-[#293C47]">
                                    <div className="flex justify-between border-b border-gray-200 pb-1"><span>Solución:</span><b>{project.solutionType}</b></div>
                                    <div className="flex justify-between border-b border-gray-200 pb-1"><span>Esquema:</span><b>{project.scheme}</b></div>
                                    <div className="flex flex-col gap-1"><span>Componentes:</span><b className="text-[10px]">{project.components}</b></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [tab, setTab] = useState('solar');
            const project = {"id":0.9249200096192584,"clientName":"Cliente","location":"México","sector":"Industrial","solutionType":"Solar","image":"https://www.enlight.mx/hubfs/default-image.jpg","images":[],"power":"0","storageCapacity":"0","annualGeneration":"0","co2Mitigated":"0","scheme":"N/A","components":"N/A","functionality":"","clientLogo":""};
            const s = {"row_number":2,"solarPower":"150+ MWp","solarGeneration":"200 GWh","solarCo2":"45,000 Ton","bessCapacity":"80+ MWh","microCount":12};

            const shouldShow = useMemo(() => {
                const type = project.solutionType.toLowerCase();
                if (tab === 'solar' && type.includes('solar')) return true;
                if (tab === 'storage' && (type.includes('storage') || type.includes('bess'))) return true;
                if (tab === 'microrredes' && (type.includes('micro') || type.includes('microrred'))) return true;
                return false;
            }, [tab]);

            return (
                <div className="max-w-7xl mx-auto px-6 py-16">
                    <header className="mb-10 flex flex-col md:flex-row items-center justify-between gap-8">
                        <img src="https://www.enlight.mx/hubfs/Enlight-Logotipo-2023.png" className="h-10" />
                        <div className="flex bg-gray-200 p-1.5 rounded-[2rem]">
                            {['solar', 'storage', 'microrredes'].map(t => (
                                <button key={t} onClick={() => setTab(t)} className={"px-8 py-3 rounded-[1.8rem] text-sm font-bold " + (tab === t ? 'bg-white shadow-lg' : 'text-gray-500')}>
                                    {t.toUpperCase()}
                                </button>
                            ))}
                        </div>
                    </header>

                    <div className="bg-[#293C47] rounded-[2.5rem] p-10 mb-16 text-white flex justify-around text-center border-b-4 border-[#FFA817]">
                        {tab === 'solar' ? (
                            <>
                                <div><p className="text-4xl font-bold text-[#00AA85]">{s.solarPower}</p><p className="text-[10px] opacity-60">POTENCIA TOTAL</p></div>
                                <div><p className="text-4xl font-bold text-[#00AA85]">{s.solarGeneration}</p><p className="text-[10px] opacity-60">GENERACIÓN</p></div>
                                <div><p className="text-4xl font-bold text-[#00AA85]">{s.solarCo2}</p><p className="text-[10px] opacity-60">CO₂ EVITADO</p></div>
                            </>
                        ) : (
                            <div><p className="text-5xl font-bold text-[#FFA817]">{tab === 'storage' ? s.bessCapacity : s.microCount}</p><p className="text-[10px] opacity-60 uppercase tracking-widest">Capacidad Instalada</p></div>
                        )}
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-10">
                        {shouldShow && <ProjectCard project={project} />}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
