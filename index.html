                                    </div>
                                </div>
                            </div>

                        {tab === 'solar' ? (
                            <>
                                <div><p className="text-5xl font-bold text-[#00AA85]">{s.solarPower}</p><p className="text-xs opacity-50 mt-2">POTENCIA INSTALADA</p></div>
                                <div><p className="text-5xl font-bold text-[#00AA85]">{s.solarGeneration}</p><p className="text-xs opacity-50 mt-2">GENERACIÓN ANUAL</p></div>
                                <div><p className="text-5xl font-bold text-[#00AA85]">{s.solarCo2}</p><p className="text-xs opacity-50 mt-2">CO₂ EVITADO</p></div>
                            </>
                        ) : (
                            <div><p className="text-6xl font-bold text-[#FFA817]">{tab === 'storage' ? s.bessCapacity : s.microCount}</p><p className="text-xs opacity-50 mt-2 uppercase tracking-widest">Capacidad Total del Sector</p></div>
                        )}
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
                        {filtered.map(project => <ProjectCard key={project.id} project={project} />)}
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
