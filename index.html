      <div className="relative group">
        <ImgFB src={imgs[idx]} alt={project.clientName} className="w-full h-48 md:h-56"/>
        {hasSlider&&(<><button onClick={function(e){e.stopPropagation();setIdx(function(p){return(p-1+imgs.length)%imgs.length;});}} className="absolute left-2 top-1/2 -translate-y-1/2 bg-black/30 hover:bg-black/50 text-white p-2 rounded-full opacity-0 group-hover:opacity-100 transition-opacity"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg></button><button onClick={function(e){e.stopPropagation();setIdx(function(p){return(p+1)%imgs.length;});}} className="absolute right-2 top-1/2 -translate-y-1/2 bg-black/30 hover:bg-black/50 text-white p-2 rounded-full opacity-0 group-hover:opacity-100 transition-opacity"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg></button><div className="absolute bottom-2 left-1/2 -translate-x-1/2 flex gap-1">{imgs.map(function(_,i){return <div key={i} className={"h-1.5 rounded-full transition-all "+(i===idx?"bg-white w-3":"bg-white/50 w-1.5")}/>;})}</div></>)}
      </div>
      <div className="p-6">
        <div className="flex justify-between items-start mb-4"><h3 className="font-bold text-lg text-[#293C47] leading-tight">{project.clientName}</h3></div>
        <div className="space-y-2 text-sm text-[#293C47]">
          <div className="flex justify-between border-b border-gray-50 pb-1"><span className="text-gray-500">Ubicacion</span><span className="font-medium text-right">{project.location}</span></div>
          {isBESS?(<div className="flex justify-between border-b border-gray-50 pb-1"><span className="text-gray-500">Capacidad de almacenamiento</span><span className="font-bold">{project.storageCapacity}</span></div>):isMicro?(<div className="flex justify-between border-b border-gray-50 pb-1"><span className="text-gray-500">Sector</span><span className="font-bold">{project.sector}</span></div>):(<div className="flex justify-between border-b border-gray-50 pb-1"><span className="text-gray-500">Potencia</span><span className="font-bold">{project.power}</span></div>)}
        </div>
        <button onClick={function(){setOpen(function(o){return !o;});}} className="mt-6 w-full py-3 bg-[#f7f8f9] text-[#293C47] rounded-xl text-xs font-bold hover:bg-[#FFA817] hover:text-white transition-all flex items-center justify-center gap-2">
          {open?"Ocultar Detalles":"Ver Detalles del Caso"}
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" style={{transform:open?"rotate(180deg)":"rotate(0deg)",transition:"transform 0.3s"}}><polyline points="6 9 12 15 18 9"></polyline></svg>
        </button>
        <div className={"exp-c "+(open?"open":"")}>
          <div className="pt-6 mt-6 border-t border-gray-100 space-y-6">
            {project.clientLogo&&(<div className="flex justify-center mb-4"><div className="bg-white p-2 rounded-lg border border-gray-100 shadow-sm"><img src={project.clientLogo} alt="Logo" className="h-10 object-contain"/></div></div>)}
            {!isBESS&&(
              <div className="grid grid-cols-2 gap-3">
                {isMicro?(<><div className="bg-gray-50 p-3 rounded-xl text-center border-2 border-[#FFA817]/20"><div className="text-[10px] text-[#FFA817] uppercase font-bold mb-1">Almacenamiento</div><div className="text-sm font-bold text-[#293C47]">{project.storageCapacity}</div></div><div className="bg-gray-50 p-3 rounded-xl text-center"><div className="text-[10px] text-gray-400 uppercase font-bold mb-1">Potencia solar</div><div className="text-sm font-bold text-[#293C47]">{project.power}</div></div><div className="bg-gray-50 p-3 rounded-xl text-center"><div className="text-[10px] text-gray-400 uppercase font-bold mb-1">Generacion</div><div className="text-sm font-bold text-[#293C47]">{project.annualGeneration}</div></div><div className="bg-gray-50 p-3 rounded-xl text-center"><div className="text-[10px] text-gray-400 uppercase font-bold mb-1">CO2 Mitigado</div><div className="text-sm font-bold text-[#293C47]">{project.co2Mitigated||"N/A"}</div></div></>):(<><div className="bg-gray-50 p-3 rounded-xl text-center"><div className="text-[10px] text-gray-400 uppercase font-bold mb-1">Generacion</div><div className="text-sm font-bold text-[#293C47]">{project.annualGeneration}</div></div><div className="bg-gray-50 p-3 rounded-xl text-center"><div className="text-[10px] text-gray-400 uppercase font-bold mb-1">CO2 Mitigado</div><div className="text-sm font-bold text-[#293C47]">{project.co2Mitigated||"N/A"}</div></div></>)}
              </div>
            )}
            <div className="space-y-3">
              <h4 className="text-xs font-bold text-gray-400 uppercase tracking-widest">Especificaciones</h4>
              <div className="text-xs space-y-2">
                {!isMicro&&<div className="flex justify-between bg-gray-50 p-2 rounded-lg"><span className="text-gray-500">Sector</span><span className="font-bold text-[#293C47]">{project.sector}</span></div>}
                <div className="flex justify-between bg-gray-50 p-2 rounded-lg"><span className="text-gray-500">Tipo de solucion</span><span className="font-bold text-[#293C47]">{project.solutionType}</span></div>
                {isMicro&&project.components&&<div className="flex flex-col bg-gray-50 p-2 rounded-lg space-y-1"><span className="text-gray-500">Componentes</span><span className="font-bold text-[#293C47]">{project.components}</span></div>}
                {(isBESS||isMicro)&&project.functionality&&<div className="flex flex-col bg-gray-50 p-2 rounded-lg space-y-1"><span className="text-gray-500">{isBESS?"Funcionalidad BESS":"Funcionalidad"}</span><span className="font-bold text-[#293C47]">{project.functionality}</span></div>}
                <div className="flex justify-between bg-gray-50 p-2 rounded-lg"><span className="text-gray-500">Esquema</span><span className="font-bold text-[#293C47]">{project.scheme}</span></div>
                {!isBESS&&!isMicro&&project.installationType&&<div className="flex justify-between bg-gray-50 p-2 rounded-lg"><span className="text-gray-500">Tipo instalacion</span><span className="font-bold text-[#293C47]">{project.installationType}</span></div>}
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}
function App(){
  const {ok,login,logout}=useAuth();
  if(!ok) return <LoginPage onLogin={login}/>;
  const [tab,setTab]=useState("solar");
  const [sb,setSb]=useState(false);
  const [fS,setFS]=useState("all"); const [fL,setFL]=useState("all"); const [fT,setFT]=useState("all"); const [fE,setFE]=useState("all");
  const allP=useMemo(function(){return[].concat(ALL_DATA.solar||[],ALL_DATA.storage||[],ALL_DATA.microgrids||[]);},[]);
  const cur=useMemo(function(){return tab==="solar"?ALL_DATA.solar||[]:tab==="storage"?ALL_DATA.storage||[]:ALL_DATA.microgrids||[];},[tab]);
  const uS=useMemo(function(){return[...new Set(allP.map(function(p){return p.sector;}).filter(Boolean))].sort();},[allP]);
  const uL=useMemo(function(){return[...new Set(allP.map(function(p){return p.location;}).filter(Boolean))].sort();},[allP]);
  const uT=useMemo(function(){return[...new Set(allP.map(function(p){return p.solutionType;}).filter(Boolean))].sort();},[allP]);
  const uE=useMemo(function(){return[...new Set(allP.map(function(p){return p.scheme;}).filter(Boolean))].sort();},[allP]);
  const fil=useMemo(function(){return cur.filter(function(p){if(fS!=="all"&&p.sector!==fS)return false;if(fL!=="all"&&p.location!==fL)return false;if(fT!=="all"&&p.solutionType!==fT)return false;if(fE!=="all"&&p.scheme!==fE)return false;return true;});},[cur,fS,fL,fT,fE]);
  const anyF=fS!=="all"||fL!=="all"||fT!=="all"||fE!=="all";
  function reset(){setFS("all");setFL("all");setFT("all");setFE("all");}
  function go(t){setTab(t);reset();}
  const lc="text-sm text-[#293C47] font-normal mt-1";
  const bc="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 mb-10 flex flex-wrap justify-around items-center text-center gap-6";
  const sel="w-full p-2 border rounded-lg text-sm bg-gray-50 outline-none";
  const lbl="text-[10px] font-bold text-gray-400 uppercase block mb-1";
  return (
    <div className="flex min-h-screen">
      {sb&&<div className="fixed inset-0 bg-black/30 z-40 md:hidden" onClick={function(){setSb(false);}}/>}
      <div className={"fixed inset-y-0 left-0 w-64 bg-white shadow-xl z-50 p-6 flex flex-col sidebar md:relative md:translate-x-0 "+(sb?"open":"")}>
        <div className="mb-10 flex items-center justify-between"><img src="https://www.enlight.mx/hubfs/Casos%20de%20%C3%A9xito/Logotipo_Enlight-02.png" alt="Enlight" className="h-8 w-auto"/><button onClick={function(){setSb(false);}} className="md:hidden text-gray-400"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button></div>
        <div className="space-y-6">
          <div className="flex justify-between items-center"><h2 className="text-xs font-bold text-gray-400 uppercase tracking-widest">Filtros Avanzados</h2>{anyF&&<button onClick={reset} className="text-[10px] text-[#FFA817] font-bold underline">Limpiar</button>}</div>
          <div className="space-y-4">
            <div><label className={lbl}>Sector</label><select className={sel} value={fS} onChange={function(e){setFS(e.target.value);}}><option value="all">Todos los Sectores</option>{uS.map(function(s){return <option key={s} value={s}>{s}</option>;})}</select></div>
            <div><label className={lbl}>Ubicacion (Estado)</label><select className={sel} value={fL} onChange={function(e){setFL(e.target.value);}}><option value="all">Todos los Estados</option>{uL.map(function(l){return <option key={l} value={l}>{l}</option>;})}</select></div>
            <div><label className={lbl}>Solucion</label><select className={sel} value={fT} onChange={function(e){setFT(e.target.value);}}><option value="all">Tipo de Solucion</option>{uT.map(function(s){return <option key={s} value={s}>{s}</option>;})}</select></div>
            <div><label className={lbl}>Esquema</label><select className={sel} value={fE} onChange={function(e){setFE(e.target.value);}}><option value="all">Cualquier Esquema</option>{uE.map(function(s){return <option key={s} value={s}>{s}</option>;})}</select></div>
          </div>
        </div>
      </div>
      <div className="flex-1 p-6 md:p-12 overflow-y-auto max-h-screen">
        <header className="flex flex-col md:flex-row justify-between items-center mb-10">
          <div className="flex items-center mb-4 md:mb-0"><button onClick={function(){setSb(true);}} className="md:hidden mr-4 p-2 bg-white rounded-lg shadow"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button><h1 className="text-3xl font-bold text-[#293C47]">{anyF?"Resultados de Busqueda":"Casos de exito con Enlight"}</h1></div>
          <div className="flex items-center gap-4"><button onClick={logout} className="text-[10px] font-bold text-gray-400 hover:text-[#293C47] uppercase tracking-widest transition-colors">Cerrar sesion</button><div className="bg-gray-200 p-1 rounded-xl flex space-x-1">{["solar","storage","microgrids"].map(function(t){return(<button key={t} onClick={function(){go(t);}} className={"px-4 py-2 rounded-lg text-sm font-bold transition-all "+(tab===t&&!anyF?"bg-white shadow text-[#293C47]":"text-gray-500")}>{t==="solar"?"Solar":t==="storage"?"BESS":"Microrredes"}</button>);})}</div></div>
        </header>
        {!anyF&&tab==="solar"&&(<div className={bc}><div><h4 className="text-3xl font-bold" style={{color:"#00AA85"}}>{BANNERS.solar.power}</h4><p className={lc}>Potencia instalada</p></div><div className="h-12 w-px bg-gray-100 hidden md:block"/><div><h4 className="text-3xl font-bold" style={{color:"#00AA85"}}>{BANNERS.solar.generation}</h4><p className={lc}>Generacion anual</p></div><div className="h-12 w-px bg-gray-100 hidden md:block"/><div><h4 className="text-3xl font-bold" style={{color:"#00AA85"}}>{BANNERS.solar.co2}</h4><p className={lc}>CO2 mitigado</p></div></div>)}
        {!anyF&&tab==="storage"&&(<div className={bc}><div><h4 className="text-3xl font-bold" style={{color:"#FFA817"}}>{BANNERS.bess.capacity}</h4><p className={lc}>Capacidad total almacenamiento</p></div></div>)}
        {!anyF&&tab==="microgrids"&&(<div className={bc}><div><h4 className="text-3xl font-bold" style={{color:"#3D7D80"}}>{BANNERS.micro.count}</h4><p className={lc}>Microrredes instaladas</p></div></div>)}
        {anyF&&<div className="mb-6"><span className="text-sm text-gray-500">Mostrando {fil.length} proyectos encontrados</span></div>}
        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">{fil.map(function(p){return <Card key={p.id} project={p}/>;})}</div>
        {fil.length===0&&(<div className="text-center py-20 bg-white rounded-3xl shadow-sm border border-dashed border-gray-200"><p className="text-gray-400 font-bold italic">No se encontraron proyectos con los filtros seleccionados.</p></div>)}
      </div>
    </div>
  );
}
createRoot(document.getElementById("root")).render(React.createElement(App,null));
</script>
</body>
</html>
