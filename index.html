<script>
const ALLOWED_DOMAIN = "enlight.mx";
const SESSION_KEY = "enlight_user";
function parseJwt(token) { try { return JSON.parse(atob(token.split(".")[1].replace(/-/g,"+").replace(/_/g,"/"))); } catch(e) { return null; } }
function handleCredentialResponse(response) {
  const payload = parseJwt(response.credential);
  if (!payload) { showError("No se pudo leer la respuesta de Google."); return; }
  const email = payload.email || "";
  if (!email.endsWith("@" + ALLOWED_DOMAIN)) { showError("Acceso denegado. Solo se permiten cuentas @" + ALLOWED_DOMAIN + ". Estas usando: " + email); return; }
  const user = { name: payload.name, email: email, picture: payload.picture };
  sessionStorage.setItem(SESSION_KEY, JSON.stringify(user));
  showApp(user);
}
function showApp(user) {
  document.getElementById("login-overlay").classList.add("hidden");
  const chip = document.getElementById("user-chip");
  chip.style.display = "flex";
  document.getElementById("user-avatar").src = user.picture || "";
  document.getElementById("user-name").textContent = user.name || user.email;
}
function logout() { sessionStorage.removeItem(SESSION_KEY); location.reload(); }
function showError(msg) { const el = document.getElementById("error-msg"); el.innerHTML = msg; el.style.display = "block"; }
window.addEventListener("load", function() {
  const stored = sessionStorage.getItem(SESSION_KEY);
  if (stored) { try { showApp(JSON.parse(stored)); } catch(e) { sessionStorage.removeItem(SESSION_KEY); } }
});
</script>

    <div className="bg-white rounded-2xl shadow-lg overflow-hidden flex flex-col hover:shadow-xl transition-all border border-gray-100 h-fit">
      <div className="relative group">
        <ImageWithFallback src={displayImages[currentImageIndex]} alt={project.clientName} className="w-full h-48 md:h-56" />
        {hasSlider && (
          <>
            <button onClick={prevImage} className="absolute left-2 top-1/2 -translate-y-1/2 bg-black/30 hover:bg-black/50 text-white p-2 rounded-full opacity-0 group-hover:opacity-100 transition-opacity"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
            <button onClick={nextImage} className="absolute right-2 top-1/2 -translate-y-1/2 bg-black/30 hover:bg-black/50 text-white p-2 rounded-full opacity-0 group-hover:opacity-100 transition-opacity"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
            <div className="absolute bottom-2 left-1/2 -translate-x-1/2 flex gap-1">{displayImages.map((_, idx) => <div key={idx} className={"w-1.5 h-1.5 rounded-full transition-all " + (idx === currentImageIndex ? "bg-white w-3" : "bg-white/50")} />)}</div>
          </>
        )}
      </div>
      <div className="p-6">
        <div className="flex justify-between items-start mb-4"><h3 className="font-bold text-lg text-[#293C47] leading-tight">{project.clientName}</h3></div>
        <div className="space-y-2 text-sm text-[#293C47]">
          <div className="flex justify-between border-b border-gray-50 pb-1"><span className="text-gray-500">Ubicación</span><span className="font-medium text-right">{project.location}</span></div>
          {isBESS ? (<div className="flex justify-between border-b border-gray-50 pb-1"><span className="text-gray-500">Capacidad de almacenamiento</span><span className="font-bold">{project.storageCapacity}</span></div>) : isMicrogrid ? (<div className="flex justify-between border-b border-gray-50 pb-1"><span className="text-gray-500">Sector</span><span className="font-bold">{project.sector}</span></div>) : (<div className="flex justify-between border-b border-gray-50 pb-1"><span className="text-gray-500">Potencia</span><span className="font-bold">{project.power}</span></div>)}
        </div>
        <button onClick={() => setIsOpen(!isOpen)} className={"mt-6 w-full py-3 bg-[#f7f8f9] text-[#293C47] rounded-xl text-xs font-bold transition-all flex items-center justify-center gap-2 " + (isBESS ? "hover:bg-[#FFA817]" : isMicrogrid ? "hover:bg-[#3D7D80]" : "hover:bg-[#00AA85]") + " hover:text-white"}>
          {isOpen ? "Ocultar Detalles" : "Ver Detalles del Caso"}
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={"transition-transform duration-300 " + (isOpen ? "rotate-180" : "")}><polyline points="6 9 12 15 18 9"></polyline></svg>
        </button>
        <div className={"expandable-content " + (isOpen ? "open" : "")}>
          <div className="pt-6 mt-6 border-t border-gray-100 space-y-6">
            {project.clientLogo && (<div className="flex justify-center mb-4"><div className="bg-white p-2 rounded-lg border border-gray-100 shadow-sm"><img src={project.clientLogo} alt="Logo Cliente" className="h-10 object-contain" /></div></div>)}
            {!isBESS && (
              <div className="grid grid-cols-2 gap-3">
                {isMicrogrid ? (<><div className="bg-gray-50 p-3 rounded-xl text-center border-2 border-[#FFA817]/20"><div className="text-[10px] text-[#FFA817] uppercase font-bold mb-1">Almacenamiento</div><div className="text-sm font-bold text-[#293C47]">{project.storageCapacity}</div></div><div className="bg-gray-50 p-3 rounded-xl text-center"><div className="text-[10px] text-gray-400 uppercase font-bold mb-1">Potencia solar</div><div className="text-sm font-bold text-[#293C47]">{project.power}</div></div><div className="bg-gray-50 p-3 rounded-xl text-center"><div className="text-[10px] text-gray-400 uppercase font-bold mb-1">Generación</div><div className="text-sm font-bold text-[#293C47]">{project.annualGeneration}</div></div><div className="bg-gray-50 p-3 rounded-xl text-center"><div className="text-[10px] text-gray-400 uppercase font-bold mb-1">CO₂ Mitigado</div><div className="text-sm font-bold text-[#293C47]">{project.co2Mitigated || "N/A"}</div></div></>) : (<><div className="bg-gray-50 p-3 rounded-xl text-center"><div className="text-[10px] text-gray-400 uppercase font-bold mb-1">Generación</div><div className="text-sm font-bold text-[#293C47]">{project.annualGeneration}</div></div><div className="bg-gray-50 p-3 rounded-xl text-center"><div className="text-[10px] text-gray-400 uppercase font-bold mb-1">CO₂ Mitigado</div><div className="text-sm font-bold text-[#293C47]">{project.co2Mitigated || "N/A"}</div></div></>)}
              </div>
            )}
            <div className="space-y-3"><h4 className="text-xs font-bold text-gray-400 uppercase tracking-widest">Especificaciones</h4>
              <div className="text-xs space-y-2">
                {!isMicrogrid && <div className="flex justify-between bg-gray-50 p-2 rounded-lg"><span className="text-gray-500">Sector</span><span className="font-bold text-[#293C47]">{project.sector}</span></div>}
                <div className="flex justify-between bg-gray-50 p-2 rounded-lg"><span className="text-gray-500">Tipo de solución</span><span className="font-bold text-[#293C47]">{project.solutionType}</span></div>
                {isMicrogrid && project.components && <div className="flex flex-col bg-gray-50 p-2 rounded-lg space-y-1"><span className="text-gray-500">Componentes de la microrred</span><span className="font-bold text-[#293C47]">{project.components}</span></div>}
                {(isBESS || isMicrogrid) && project.functionality && <div className="flex flex-col bg-gray-50 p-2 rounded-lg space-y-1"><span className="text-gray-500">{isBESS ? "Funcionalidad del BESS" : "Funcionalidad"}</span><span className="font-bold text-[#293C47]">{project.functionality}</span></div>}
                <div className="flex justify-between bg-gray-50 p-2 rounded-lg"><span className="text-gray-500">Esquema</span><span className="font-bold text-[#293C47]">{project.scheme}</span></div>
                {!isBESS && !isMicrogrid && project.installationType && <div className="flex justify-between bg-gray-50 p-2 rounded-lg"><span className="text-gray-500">Tipo de instalación</span><span className="font-bold text-[#293C47]">{project.installationType}</span></div>}
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
};
const App = () => {
  const [activeTab, setActiveTab] = useState("solar");
  const [tabKey, setTabKey] = useState(0);
  const [isSidebarOpen, setIsSidebarOpen] = useState(false);
  const [selectedSector, setSelectedSector] = useState("all");
  const [selectedLocation, setSelectedLocation] = useState("all");
  const [selectedSolutionType, setSelectedSolutionType] = useState("all");
  const [selectedScheme, setSelectedScheme] = useState("all");
  const allProjects = useMemo(() => [...(ALL_DATA.solar||[]), ...(ALL_DATA.storage||[]), ...(ALL_DATA.microgrids||[])], []);
  const currentProjects = useMemo(() => { if(activeTab==="solar") return ALL_DATA.solar||[]; if(activeTab==="storage") return ALL_DATA.storage||[]; return ALL_DATA.microgrids||[]; }, [activeTab]);
  const allSectors       = useMemo(() => [...new Set(allProjects.map(p=>p.sector).filter(Boolean))].sort(), [allProjects]);
  const allLocations     = useMemo(() => [...new Set(allProjects.map(p=>p.location).filter(Boolean))].sort(), [allProjects]);
  const allSolutionTypes = useMemo(() => [...new Set(allProjects.map(p=>p.solutionType).filter(Boolean))].sort(), [allProjects]);
  const allSchemes       = useMemo(() => [...new Set(allProjects.map(p=>p.scheme).filter(Boolean))].sort(), [allProjects]);
  const filteredProjects = useMemo(() => currentProjects.filter(p => { if(selectedSector!=="all"&&p.sector!==selectedSector)return false; if(selectedLocation!=="all"&&p.location!==selectedLocation)return false; if(selectedSolutionType!=="all"&&p.solutionType!==selectedSolutionType)return false; if(selectedScheme!=="all"&&p.scheme!==selectedScheme)return false; return true; }), [currentProjects,selectedSector,selectedLocation,selectedSolutionType,selectedScheme]);
  const isAnyFilterActive = selectedSector!=="all"||selectedLocation!=="all"||selectedSolutionType!=="all"||selectedScheme!=="all";
  const resetFilters = () => { setSelectedSector("all"); setSelectedLocation("all"); setSelectedSolutionType("all"); setSelectedScheme("all"); };
  const changeTab = (tab) => { setActiveTab(tab); resetFilters(); setTabKey(function(k){ return k+1; }); };
  const bannerClasses = "bg-white rounded-2xl shadow-sm border border-gray-100 p-8 mb-10 flex flex-wrap justify-around items-center text-center gap-6";
  const labelClasses  = "text-sm text-[#293C47] font-normal mt-1";
  const renderBanner = () => {
    if(activeTab==="solar") return (<div className={bannerClasses}><div><h4 className="text-3xl font-bold" style={{color:"#00AA85"}}>{BANNERS.solar.power}</h4><p className={labelClasses}>Potencia instalada</p></div><div className="h-12 w-px bg-gray-100 hidden md:block"></div><div><h4 className="text-3xl font-bold" style={{color:"#00AA85"}}>{BANNERS.solar.generation}</h4><p className={labelClasses}>Generación anual</p></div><div className="h-12 w-px bg-gray-100 hidden md:block"></div><div><h4 className="text-3xl font-bold" style={{color:"#00AA85"}}>{BANNERS.solar.co2}</h4><p className={labelClasses}>CO₂ mitigado</p></div></div>);
    if(activeTab==="storage") return (<div className={bannerClasses}><div><h4 className="text-3xl font-bold" style={{color:"#FFA817"}}>{BANNERS.bess.capacity}</h4><p className={labelClasses}>Capacidad total almacenamiento</p></div></div>);
    return (<div className={bannerClasses}><div><h4 className="text-3xl font-bold" style={{color:"#3D7D80"}}>{BANNERS.micro.count}</h4><p className={labelClasses}>Microrredes instaladas</p></div></div>);
  };
  return (
    <div className="flex min-h-screen">
      {isSidebarOpen && <div className="fixed inset-0 bg-black/30 z-40 md:hidden" onClick={() => setIsSidebarOpen(false)}></div>}
      <div className={"fixed inset-y-0 left-0 w-64 bg-white shadow-xl z-50 p-6 flex flex-col sidebar md:relative md:translate-x-0 " + (isSidebarOpen ? "open" : "")}>
        <div className="mb-10 flex items-center justify-between"><img src="https://www.enlight.mx/hubfs/Casos%20de%20%C3%A9xito/Logotipo_Enlight-02.png" alt="Enlight" className="h-8 w-auto" /><button onClick={() => setIsSidebarOpen(false)} className="md:hidden text-gray-400"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button></div>
        <div className="space-y-6">
          <div className="flex justify-between items-center"><h2 className="text-xs font-bold text-gray-400 uppercase tracking-widest">Filtros Avanzados</h2>{isAnyFilterActive && <button onClick={resetFilters} className="text-[10px] text-[#FFA817] font-bold underline">Limpiar</button>}</div>
          <div className="space-y-4">
            <div className="space-y-1"><label className="text-[10px] font-bold text-gray-400 uppercase">Sector</label><select className="w-full p-2 border rounded-lg text-sm bg-gray-50 outline-none focus:ring-2 focus:ring-[#FFA817]" value={selectedSector} onChange={e => setSelectedSector(e.target.value)}><option value="all">Todos los Sectores</option>{allSectors.map(s => <option key={s} value={s}>{s}</option>)}</select></div>
            <div className="space-y-1"><label className="text-[10px] font-bold text-gray-400 uppercase">Ubicación (Estado)</label><select className="w-full p-2 border rounded-lg text-sm bg-gray-50 outline-none focus:ring-2 focus:ring-[#FFA817]" value={selectedLocation} onChange={e => setSelectedLocation(e.target.value)}><option value="all">Todos los Estados</option>{allLocations.map(l => <option key={l} value={l}>{l}</option>)}</select></div>
            <div className="space-y-1"><label className="text-[10px] font-bold text-gray-400 uppercase">Solución</label><select className="w-full p-2 border rounded-lg text-sm bg-gray-50 outline-none focus:ring-2 focus:ring-[#FFA817]" value={selectedSolutionType} onChange={e => setSelectedSolutionType(e.target.value)}><option value="all">Tipo de Solución</option>{allSolutionTypes.map(s => <option key={s} value={s}>{s}</option>)}</select></div>
            <div className="space-y-1"><label className="text-[10px] font-bold text-gray-400 uppercase">Esquema</label><select className="w-full p-2 border rounded-lg text-sm bg-gray-50 outline-none focus:ring-2 focus:ring-[#FFA817]" value={selectedScheme} onChange={e => setSelectedScheme(e.target.value)}><option value="all">Cualquier Esquema</option>{allSchemes.map(s => <option key={s} value={s}>{s}</option>)}</select></div>
          </div>
        </div>
      </div>
      <div className="flex-1 p-6 md:p-12 overflow-y-auto max-h-screen">
        <header className="flex flex-col md:flex-row justify-between items-center mb-10">
          <div className="flex items-center mb-4 md:mb-0"><button onClick={() => setIsSidebarOpen(true)} className="md:hidden mr-4 p-2 bg-white rounded-lg shadow"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button><h1 className="text-3xl font-bold text-[#293C47]">{isAnyFilterActive ? "Resultados de Búsqueda" : "Casos de éxito con Enlight"}</h1></div>
          <div className="bg-gray-200 p-1 rounded-xl flex space-x-1">{["solar","storage","microgrids"].map(tab => (<button key={tab} onClick={() => changeTab(tab)} className={"px-4 py-2 rounded-lg text-sm font-bold transition-all " + (activeTab===tab&&!isAnyFilterActive ? "bg-white shadow text-[#293C47]" : "text-gray-500")}>{tab==="solar"?"Solar":tab==="storage"?"BESS":"Microrredes"}</button>))}</div>
        </header>
        {!isAnyFilterActive && renderBanner()}
        {isAnyFilterActive && <div className="mb-6"><span className="text-sm text-gray-500">Mostrando {filteredProjects.length} proyectos encontrados en todas las categorías:</span></div>}
        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">{filteredProjects.map(p => <ProjectCard key={tabKey + "-" + p.id} project={p} />)}</div>
        {filteredProjects.length === 0 && <div className="text-center py-20 bg-white rounded-3xl shadow-sm border border-dashed border-gray-200"><p className="text-gray-400 font-bold italic">No se encontraron proyectos con los filtros seleccionados.</p></div>}
      </div>
    </div>
  );
};
createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
