const ImageWithFallback = ({ src, alt, className = '' }) => {
    const fallback = 'https://images.pexels.com/photos/9875414/pexels-photo-9875414.jpeg?auto=compress&cs=tinysrgb&w=800';
    const [imgSrc, setImgSrc] = useState(src);
    const [loading, setLoading] = useState(true);
    useEffect(() => { setImgSrc(src); setLoading(true); }, [src]);
    return (
        <div className={`relative overflow-hidden ${className}`}>
            {loading && <div className="absolute inset-0 bg-gray-100 animate-pulse flex items-center justify-center"><div className="w-8 h-8 border-2 border-[#3D7D80] border-t-[#293C47] rounded-full animate-spin"></div></div>}
            <img src={imgSrc} alt={alt} className={`w-full h-full object-cover transition-opacity duration-300 ${loading ? 'opacity-0' : 'opacity-100'}`}
                onError={() => { setImgSrc(fallback); setLoading(false); }}
                onLoad={() => setLoading(false)} />
        </div>
    );
};

                                        <div className="bg-gray-50 p-3 rounded-xl text-center"><div className="text-[10px] text-gray-400 uppercase font-bold mb-1">CO₂ Mitigado</div><div className="text-sm font-bold text-[#293C47]">{project.co2Mitigated || 'N/A'}</div></div>
                                    </>
                                )}
                            </div>
                        )}
                        <div className="space-y-3">
                            <h4 className="text-xs font-bold text-gray-400 font-normal">Especificaciones</h4>
                            <div className="text-xs space-y-2">
                                {!isMicro && <div className="flex justify-between bg-gray-50 p-2 rounded-lg"><span className="text-gray-500">Sector</span><span className="font-bold text-[#293C47]">{project.sector}</span></div>}
                                <div className="flex justify-between bg-gray-50 p-2 rounded-lg"><span className="text-gray-500">Tipo de solución</span><span className="font-bold text-[#293C47]">{project.solutionType}</span></div>
                                {isMicro && project.components && <div className="flex flex-col bg-gray-50 p-2 rounded-lg space-y-1"><span className="text-gray-500">Componentes</span><span className="font-bold text-[#293C47]">{project.components}</span></div>}
                                {(isBESS || isMicro) && project.functionality && <div className="flex flex-col bg-gray-50 p-2 rounded-lg space-y-1"><span className="text-gray-500">{isBESS ? 'Funcionalidad del BESS' : 'Funcionalidad'}</span><span className="font-bold text-[#293C47]">{project.functionality}</span></div>}
                                <div className="flex justify-between bg-gray-50 p-2 rounded-lg"><span className="text-gray-500">Esquema</span><span className="font-bold text-[#293C47]">{project.scheme}</span></div>
                                {!isBESS && !isMicro && project.installationType && <div className="flex justify-between bg-gray-50 p-2 rounded-lg"><span className="text-gray-500">Tipo de instalación</span><span className="font-bold text-[#293C47]">{project.installationType}</span></div>}
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    );
};

const App = () => {
    const [activeTab, setActiveTab] = useState('solar');
    const [isSidebarOpen, setIsSidebarOpen] = useState(false);
    const [selectedSector, setSelectedSector] = useState('all');
    const [selectedLocation, setSelectedLocation] = useState('all');
    const [selectedSolutionType, setSelectedSolutionType] = useState('all');
    const [selectedScheme, setSelectedScheme] = useState('all');

    const currentProjects = useMemo(() => {
        if (activeTab === 'solar')   return ALL_DATA.solar    || [];
        if (activeTab === 'storage') return ALL_DATA.storage  || [];
        return ALL_DATA.microgrids || [];
    }, [activeTab]);

    const allSectors      = useMemo(() => [...new Set(currentProjects.map(p => p.sector).filter(Boolean))].sort(),       [currentProjects]);
    const allLocations    = useMemo(() => [...new Set(currentProjects.map(p => p.location).filter(Boolean))].sort(),     [currentProjects]);
    const allSolutionTypes= useMemo(() => [...new Set(currentProjects.map(p => p.solutionType).filter(Boolean))].sort(), [currentProjects]);
    const allSchemes      = useMemo(() => [...new Set(currentProjects.map(p => p.scheme).filter(Boolean))].sort(),       [currentProjects]);

    const filteredProjects = useMemo(() => currentProjects.filter(p => {
        if (selectedSector       !== 'all' && p.sector       !== selectedSector)       return false;
        if (selectedLocation     !== 'all' && p.location     !== selectedLocation)     return false;
        if (selectedSolutionType !== 'all' && p.solutionType !== selectedSolutionType) return false;
        if (selectedScheme       !== 'all' && p.scheme       !== selectedScheme)       return false;
        return true;
    }), [currentProjects, selectedSector, selectedLocation, selectedSolutionType, selectedScheme]);

    const isAnyFilterActive = selectedSector !== 'all' || selectedLocation !== 'all' || selectedSolutionType !== 'all' || selectedScheme !== 'all';
    const resetFilters = () => { setSelectedSector('all'); setSelectedLocation('all'); setSelectedSolutionType('all'); setSelectedScheme('all'); };

    const renderBanner = () => {
        const bannerClasses = 'bg-white rounded-2xl shadow-sm border border-gray-100 p-8 mb-10 flex flex-wrap justify-around items-center text-center gap-6';
        const labelClasses  = 'text-sm text-[#293C47] font-normal mt-1';
        if (activeTab === 'solar') return (
            <div className={bannerClasses}>
                <div><h4 className="text-3xl font-bold" style={{color:'#00AA85'}}>{BANNERS.solar.power}</h4><p className={labelClasses}>Potencia instalada</p></div>
                <div className="h-12 w-px bg-gray-100 hidden md:block"></div>
                <div><h4 className="text-3xl font-bold" style={{color:'#00AA85'}}>{BANNERS.solar.generation}</h4><p className={labelClasses}>Generación anual</p></div>
                <div className="h-12 w-px bg-gray-100 hidden md:block"></div>
                <div><h4 className="text-3xl font-bold" style={{color:'#00AA85'}}>{BANNERS.solar.co2}</h4><p className={labelClasses}>CO₂ mitigado</p></div>
            </div>
        );
        if (activeTab === 'storage') return (
            <div className={bannerClasses}>
                <div><h4 className="text-3xl font-bold" style={{color:'#FFA817'}}>{BANNERS.bess.capacity}</h4><p className={labelClasses}>Capacidad total almacenamiento</p></div>
            </div>
        );
        return (
            <div className={bannerClasses}>
                <div><h4 className="text-3xl font-bold" style={{color:'#3D7D80'}}>{BANNERS.micro.count}</h4><p className={labelClasses}>Microrredes instaladas</p></div>
            </div>
        );
    };

    const changeTab = (tab) => { setActiveTab(tab); resetFilters(); };

    return (
        <div className="flex min-h-screen">
            {isSidebarOpen && <div className="fixed inset-0 bg-black/30 z-40 md:hidden" onClick={() => setIsSidebarOpen(false)}></div>}
            <div className={`fixed inset-y-0 left-0 w-64 bg-white shadow-xl z-50 p-6 flex flex-col sidebar md:relative md:translate-x-0 ${isSidebarOpen ? 'open' : ''}`}>
                <div className="mb-10 flex items-center justify-between">
                    <img src="https://www.enlight.mx/hubfs/Casos%20de%20%C3%A9xito/Logotipo_Enlight-02.png" alt="Enlight" className="h-8 w-auto" />
                    <button onClick={() => setIsSidebarOpen(false)} className="md:hidden text-gray-400">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
                <div className="space-y-6">
                    <div className="flex justify-between items-center">
                        <h2 className="text-xs font-bold text-gray-400 font-normal">Filtros Avanzados</h2>
                        {isAnyFilterActive && <button onClick={resetFilters} className="text-[10px] text-[#FFA817] font-bold underline">Limpiar</button>}
                    </div>
                    <div className="space-y-4">
                        <div className="space-y-1"><label className="text-[10px] font-bold text-gray-400 uppercase">Sector</label><select className="w-full p-2 border rounded-lg text-sm bg-gray-50 outline-none focus:ring-2 focus:ring-[#FFA817]" value={selectedSector} onChange={e => setSelectedSector(e.target.value)}><option value="all">Todos los Sectores</option>{allSectors.map(s => <option key={s} value={s}>{s}</option>)}</select></div>
                        <div className="space-y-1"><label className="text-[10px] font-bold text-gray-400 uppercase">Ubicación (Estado)</label><select className="w-full p-2 border rounded-lg text-sm bg-gray-50 outline-none focus:ring-2 focus:ring-[#FFA817]" value={selectedLocation} onChange={e => setSelectedLocation(e.target.value)}><option value="all">Todos los Estados</option>{allLocations.map(l => <option key={l} value={l}>{l}</option>)}</select></div>
                        <div className="space-y-1"><label className="text-[10px] font-bold text-gray-400 uppercase">Solución</label><select className="w-full p-2 border rounded-lg text-sm bg-gray-50 outline-none focus:ring-2 focus:ring-[#FFA817]" value={selectedSolutionType} onChange={e => setSelectedSolutionType(e.target.value)}><option value="all">Tipo de Solución</option>{allSolutionTypes.map(s => <option key={s} value={s}>{s}</option>)}</select></div>
                        <div className="space-y-1"><label className="text-[10px] font-bold text-gray-400 uppercase">Esquema</label><select className="w-full p-2 border rounded-lg text-sm bg-gray-50 outline-none focus:ring-2 focus:ring-[#FFA817]" value={selectedScheme} onChange={e => setSelectedScheme(e.target.value)}><option value="all">Cualquier Esquema</option>{allSchemes.map(s => <option key={s} value={s}>{s}</option>)}</select></div>
                    </div>
                </div>
            </div>
            <div className="flex-1 p-6 md:p-12 overflow-y-auto max-h-screen">
                <header className="flex flex-col md:flex-row justify-between items-center mb-10">
                    <div className="flex items-center mb-4 md:mb-0">
                        <button onClick={() => setIsSidebarOpen(true)} className="md:hidden mr-4 p-2 bg-white rounded-lg shadow">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                        </button>
                        <h1 className="text-3xl font-bold text-[#293C47]">{isAnyFilterActive ? 'Resultados de Búsqueda' : 'Casos de éxito con Enlight'}</h1>
                    </div>
                    <div className="bg-gray-200 p-1 rounded-xl flex space-x-1">
                        {['solar','storage','microgrids'].map(tab => (
                            <button key={tab} onClick={() => changeTab(tab)} className={`px-4 py-2 rounded-lg text-sm font-bold transition-all ${activeTab === tab && !isAnyFilterActive ? 'bg-white shadow text-[#293C47]' : 'text-gray-500'}`}>
                                {tab === 'solar' ? 'Solar' : tab === 'storage' ? 'BESS' : 'Microrredes'}
                            </button>
                        ))}
                    </div>
                </header>
                {!isAnyFilterActive && renderBanner()}
                {isAnyFilterActive && <div className="mb-6"><span className="text-sm text-gray-500">Mostrando {filteredProjects.length} proyectos encontrados</span></div>}
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    {filteredProjects.map(p => <ProjectCard key={p.id} project={p} />)}
                </div>
                {filteredProjects.length === 0 && (
                    <div className="text-center py-20 bg-white rounded-3xl shadow-sm border border-dashed border-gray-200">
                        <p className="text-gray-400 font-bold italic">No se encontraron proyectos con los filtros seleccionados.</p>
                    </div>
                )}
            </div>
        </div>
    );
};

createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
